services:
  backend:
    container_name: backend
    build:
      context: ./backend
    networks:
      - project_network
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-CHANGEME}
      - DEBUG=${DEBUG:-True}
      - DB_FILE=${DB_FILE:-db.sqlite3}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; print(None if urllib.request.urlopen('http://localhost:8000/api/health').status == 200 else 0/0)" ]
      timeout: 10s
      interval: 5s
      retries: 3
  db:
    container_name: db
    image: postgres:18
    networks:
      - project_network
    environment:
      - SECRET_KEY=${SECRET_KEY:-CHANGEME}
      - POSTGRES_HOST=db
      - POSTGRES_PORT=${POSTGRES_PORT:-default_port}
      - POSTGRES_USER=${POSTGRES_USER:-default_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-default_password}
      - POSTGRES_DB=${POSTGRES_DB:-default_db}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h ${POSTGRES_HOST} -p 5432 -d ${POSTGRES_DB} -U ${POSTGRES_USER}" ]
      timeout: 10s
      interval: 5s
      retries: 3
  frontend:
    container_name: frontend
    build:
      context: ./frontend
    command: "npm run dev -- --host 0.0.0.0"
    ports:
      - "3000:5173"
    networks:
      - project_network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:5173 || exit 1" ]
      timeout: 10s
      interval: 5s
      retries: 3
networks:
  project_network:
    driver: bridge
